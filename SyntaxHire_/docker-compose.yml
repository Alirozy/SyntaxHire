
services:
  # PostgreSQL Servisi
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data

  # Django Web Servisi
  web:
    build: .
    image: syntaxhire-web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - django_media:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
  
  celery:
    build: .
    image: syntaxhire-celery
    command: celery -A SyntaxHire_ worker -l info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
  django_media:
  redis_data:

services:
  # PostgreSQL Servisi
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    expose:
      - "${DB_PORT}:5432"

  redis:
    image: redis:7-alpine
    expose:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data

  # Django Web Servisi
  web:
    build: .
    image: syntaxhire-web
    command: gunicorn SyntaxHire_.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    expose:
    - "8000"
    env_file:
      - .env
    depends_on:
      - db
  
  celery:
    build: .
    image: syntaxhire-celery
    command: celery -A SyntaxHire_ worker -l info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db
      - redis
  
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443" # HTTPS portunu açıyoruz
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt      # Sertifikaların duracağı yer
      - ./certbot/www:/var/www/certbot       # Doğrulama klasörü
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - web

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
  
